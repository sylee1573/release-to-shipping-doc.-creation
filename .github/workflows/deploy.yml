name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Build
        working-directory: frontend
        env:
          VITE_API_URL: https://backend-production-9aaf.up.railway.app
        run: |
          npm ci
          npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_mm8Gh7d4hmCHafjvAdQNB94u
          VERCEL_PROJECT_ID: prj_WN1eafqfWYSB0AaLeYwHZiCDWZDs
        run: |
          npm install -g vercel
          vercel deploy frontend/dist --prebuilt --prod --token $VERCEL_TOKEN

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach -m "auto deploy from GitHub Actions"
